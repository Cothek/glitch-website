<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#8888a0" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow -->
  <ellipse cx="600" cy="280" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="140" font-weight="800" fill="url(#titleGrad)" letter-spacing="-4">Glitch</text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="500" fill="#8888a0">Your AI companion that actually remembers</text>

  <!-- Tag chips -->
  <g font-family="ui-monospace, monospace" font-size="18" fill="#8888a0">
    <g transform="translate(280, 460)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#12121a" stroke="#1e1e30"/>
      <text x="60" y="24" text-anchor="middle">23 skills</text>
    </g>
    <g transform="translate(420, 460)">
      <rect x="0" y="0" width="220" height="36" rx="18" fill="#12121a" stroke="#1e1e30"/>
      <text x="110" y="24" text-anchor="middle">3-layer architecture</text>
    </g>
    <g transform="translate(660, 460)">
      <rect x="0" y="0" width="240" height="36" rx="18" fill="#12121a" stroke="#1e1e30"/>
      <text x="120" y="24" text-anchor="middle">Windows · macOS · Linux</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="570" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#555570">github.com/Cothek/glitch-ai</text>
</svg>
